name: filehive
description: "Offline peer-to-peer file transfer application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ==================================================
  # STATE MANAGEMENT
  # ==================================================

  # App-wide state management
  #
  # UI ↔ Services ↔ Data flow
  #
  # Example:
  # Room state
  # Connected devices
  # Transfer progress
  flutter_riverpod: ^3.3.1


  # ==================================================
  # NAVIGATION
  # ==================================================

  # App routing/navigation
  #
  # Example:
  # Home
  # → Create Room
  # → Join Room
  # → Send Screen
  # → Receive Screen
  go_router: ^17.2.1


  # ==================================================
  # NETWORKING
  # ==================================================

  # HTTP requests
  #
  # Future use:
  # update checks
  # optional APIs
  dio: ^5.0.0

  # Multipart request parser
  #
  # File metadata + uploads
  http_parser: ^4.0.2

  # Detect:
  #
  # WiFi
  # Mobile
  # Ethernet
  #
  # Used inside:
  # connectivity_service.dart
  connectivity_plus: ^7.1.1

  # Get:
  #
  # local IP
  # gateway
  # network information
  #
  # Used inside:
  # network_info_service.dart
  network_info_plus: ^7.0.0


  # ==================================================
  # FILEHIVE DISCOVERY SYSTEM
  # ==================================================

  # mDNS scanner
  #
  # Nearby FileHive devices scan karega
  #
  # Example:
  #
  # "Network me kaun available hai?"
  #
  # Used in:
  # mdns_service.dart
  multicast_dns: ^0.3.2


  # mDNS Broadcast / Registration
  #
  # Iska kaam:
  #
  # "Main yaha hoon"
  #
  # Device network me announce hoga
  #
  # Example:
  #
  # Device:
  # Priyanshu Phone
  #
  # Service:
  # _filehive._tcp
  #
  # Port:
  # 8080
  #
  # Used in:
  # mdns_broadcast_service.dart
  nsd: ^5.0.1


  # ==================================================
  # LOCAL FILE SERVER
  # ==================================================

  # Local HTTP server
  #
  # Host machine pe chalega
  #
  # File transfer ke liye
  shelf: ^1.4.0


  # API routes
  #
  # Example:
  #
  # /upload
  # /download
  shelf_router: ^1.1.0


  # Real-time communication
  #
  # Example:
  #
  # transfer status
  # room updates
  shelf_web_socket: ^3.0.0


  # Multipart upload support
  shelf_multipart: ^1.0.0


  # ==================================================
  # FILE MANAGEMENT
  # ==================================================

  # Device se:
  #
  # files
  # folders
  #
  # choose karne ke liye
  #
  # Send screen me use hoga
  file_picker: ^11.0.2

  # Device storage path
  #
  # Example:
  #
  # Downloads
  # App directory
  path_provider: ^2.1.0

  # File path manipulation
  #
  # Example:
  #
  # /storage/a/file.jpg
  path: ^1.9.0


  # ==================================================
  # PERMISSIONS
  # ==================================================

  # Runtime permissions
  #
  # Storage
  # Nearby devices
  # Location
  #
  # Android specific
  permission_handler: ^12.0.1


  # ==================================================
  # UTILS
  # ==================================================

  # Encryption
  # Hashing
  # Checksum
  #
  # Future:
  #
  # file integrity check
  # duplicate detection
  crypto: ^3.0.3


  # ==================================================
  # UI
  # ==================================================

  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true